# Project-wide Gradle settings.

# JVM args for Gradle Daemon
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Enable AndroidX
android.useAndroidX=true
android.enableJetifier=true

# Force Gradle to use Java 17
# ⚠️ This is the correct Java 17 path on GitHub Actions Ubuntu runners
org.gradle.java.home=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17*/x64

# Improve build performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# Kotlin JVM target (fixes Kotlin compile errors on CI)
kotlin.code.style=official
kotlin.incremental=true

# Prevent AGP from trying to use Java 21
systemProp.java.specification.version=17
systemProp.java.version=17
