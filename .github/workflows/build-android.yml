name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install npm dependencies
        run: |
          cd frontend
          npm install
          
      - name: Build frontend & sync Capacitor
        run: |
          cd frontend
          npm run build
          npx cap sync android
          
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Decode keystore
        run: |
          mkdir -p frontend/android/app
          echo "$KEYSTORE_FILE" | base64 --decode > frontend/android/app/blockstar-cypher.keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          
      - name: Build signed release APK
        run: |
          cd frontend/android
          ./gradlew assembleRelease \
            -PKEYSTORE_PASSWORD="${KEYSTORE_PASSWORD}" \
            -PKEY_PASSWORD="${KEY_PASSWORD}" \
            -PKEY_ALIAS="${KEY_ALIAS}"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          
      - name: List APK files
        run: |
          echo "=== APK files found ==="
          find frontend/android -name "*.apk" -type f -ls
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockStar-release-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error