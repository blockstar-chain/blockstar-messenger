name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3) Install dependencies in frontend
      - name: Install npm dependencies
        run: |
          cd frontend
          npm install

      # 4) Setup Java 17 (must be BEFORE Android sync & Gradle)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 5) Install Android SDK (must be BEFORE npx cap sync)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 6) Build Next.js + sync Capacitor (android)
      - name: Build frontend & sync Capacitor
        run: |
          cd frontend
          npm run build
          npx cap sync android   # Now uses correct Java + SDK

      # 7) Restore keystore into android/app/
      - name: Decode keystore into android/app
        run: |
          mkdir -p frontend/android/app
          echo "$KEYSTORE_FILE" | base64 --decode > frontend/android/app/blockstar-cypher.keystore
          echo "Keystore restored:"
          ls -al frontend/android/app
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      # 8) Build signed release APK
      - name: Build signed release APK
        run: |
          cd frontend/android
          ./gradlew assembleRelease --stacktrace --warning-mode all

      # 9) Upload APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockStar-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
