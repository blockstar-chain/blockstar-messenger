name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD FRONTEND (shared by all platforms)
  # ═══════════════════════════════════════════════════════════════
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
      - name: Build frontend for Electron
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://api.example.com' }}

      - name: Verify build output
        working-directory: frontend
        run: |
          echo "Checking build output..."
          ls -la out/
          echo "Checking _next directory..."
          ls -la out/_next/ || echo "_next directory not found"
          echo "Checking for CSS files..."
          find out -name "*.css" || echo "No CSS files found"
          echo "Checking for JS files..."
          find out -name "*.js" | head -5 || echo "No JS files found"
      - name: Upload frontend build
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: frontend/out
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # WINDOWS BUILD (Electron)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows != 'false' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v6
        with:
          name: frontend-build
          path: frontend/out

      - name: Verify downloaded build
        working-directory: frontend
        shell: pwsh
        run: |
          Write-Host "Checking downloaded files..."
          Get-ChildItem out -Recurse | Select-Object FullName | Format-Table -AutoSize
      - name: Install dependencies
        working-directory: frontend
        run: |
          if (Test-Path "package-lock.json") {
            npm ci --legacy-peer-deps
          } else {
            npm install --legacy-peer-deps
          }
        shell: pwsh

      - name: Install Electron dependencies
        working-directory: frontend
        run: npm install --save-dev electron electron-builder --legacy-peer-deps
        
      - name: Create Electron files
        working-directory: frontend
        shell: pwsh
        run: |
          # Create electron directory
          New-Item -ItemType Directory -Force -Path "electron"
          
          # Create main.js with proper file loading
          @"
          const { app, BrowserWindow, shell, protocol } = require('electron');
          const path = require('path');
          const url = require('url');
          const fs = require('fs');
          let mainWindow;
          protocol.registerSchemesAsPrivileged([
            {
              scheme: 'app',
              privileges: {
                standard: true,
                secure: true,
                supportFetchAPI: true,
                corsEnabled: true
              }
            }
          ]);
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              minWidth: 800,
              minHeight: 600,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                webSecurity: true,
              },
              icon: path.join(__dirname, '../public/icon.png'),
              titleBarStyle: 'default',
              show: false,
            });
            if (process.env.NODE_ENV === 'development') {
              mainWindow.loadURL('http://localhost:3000');
              mainWindow.webContents.openDevTools();
            } else {
              const indexPath = path.join(__dirname, '../out/index.html');
              
              if (fs.existsSync(indexPath)) {
                mainWindow.loadURL(url.format({
                  pathname: indexPath,
                  protocol: 'file:',
                  slashes: true
                }));
              } else {
                console.error('index.html not found at:', indexPath);
              }
            }
            mainWindow.webContents.setWindowOpenHandler(({ url: linkUrl }) => {
              shell.openExternal(linkUrl);
              return { action: 'deny' };
            });
            mainWindow.webContents.on('did-fail-load', (event, errorCode, errorDescription, validatedURL) => {
              console.error('Failed to load:', validatedURL, errorDescription);
            });
            mainWindow.once('ready-to-show', () => {
              mainWindow.show();
            });
            mainWindow.on('closed', () => {
              mainWindow = null;
            });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });
          app.on('activate', () => {
            if (BrowserWindow.getAllWindows().length === 0) {
              createWindow();
            }
          });
          "@ | Out-File -FilePath "electron/main.js" -Encoding UTF8
      - name: Generate Windows icon
        working-directory: frontend
        shell: pwsh
        run: |
          npm install --save-dev sharp
          
          @"
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');
          
          async function generateIcon() {
            const pngPath = 'public/icon.png';
            
            if (!fs.existsSync('public')) {
              fs.mkdirSync('public', { recursive: true });
            }
            
            if (!fs.existsSync(pngPath)) {
              console.log('Creating placeholder icon...');
              const svg = Buffer.from(
                '<svg width="256" height="256"><rect width="256" height="256" fill="#3B82F6"/><text x="128" y="140" text-anchor="middle" font-size="48" fill="white">BC</text></svg>'
              );
              await sharp(svg).resize(256, 256).png().toFile(pngPath);
            }
            
            const metadata = await sharp(pngPath).metadata();
            console.log('Icon size:', metadata.width, 'x', metadata.height);
            
            if (metadata.width < 256 || metadata.height < 256) {
              console.log('Resizing icon to 256x256...');
              await sharp(pngPath)
                .resize(256, 256, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                .toFile('public/icon-256.png');
              fs.copyFileSync('public/icon-256.png', pngPath);
            }
            
            console.log('Icon ready');
          }
          
          generateIcon().catch(console.error);
          "@ | Out-File -FilePath "generate-icon.js" -Encoding UTF8
          
          node generate-icon.js
      - name: Update package.json
        working-directory: frontend
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.main = "electron/main.js"
          
          if (-not $pkg.description) {
            $pkg | Add-Member -NotePropertyName "description" -NotePropertyValue "BlockStar Cypher - Secure Messaging" -Force
          }
          if (-not $pkg.author) {
            $pkg | Add-Member -NotePropertyName "author" -NotePropertyValue "BlockStar" -Force
          }
          if (-not $pkg.repository) {
            $pkg | Add-Member -NotePropertyName "repository" -NotePropertyValue @{
              type = "git"
              url = "https://github.com/user/repo"
            } -Force
          }
          
          $pkg | Add-Member -NotePropertyName "build" -NotePropertyValue @{
            appId = "com.blockstar.cypher"
            productName = "BlockStar Cypher"
            directories = @{
              output = "dist"
            }
            files = @(
              "electron/**/*",
              "out/**/*",
              "public/**/*",
              "!out/.next/cache/**/*"
            )
            win = @{
              target = @("nsis", "portable")
              icon = "public/icon.png"
            }
            publish = $null
            generateUpdatesFilesForAllChannels = $false
            compression = "normal"
            asar = $true
          } -Force
          
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
      - name: Build Windows App
        working-directory: frontend
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Build
        uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: |
            frontend/dist/*.exe
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # MACOS BUILD (Electron)
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    needs: build-frontend
    runs-on: macos-latest
    if: ${{ github.event.inputs.build_macos != 'false' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v6
        with:
          name: frontend-build
          path: frontend/out

      - name: Verify downloaded build
        working-directory: frontend
        run: |
          echo "Checking downloaded files..."
          find out -type f | head -20
      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi
      - name: Install Electron dependencies
        working-directory: frontend
        run: npm install --save-dev electron electron-builder --legacy-peer-deps

      - name: Create Electron main.js
        working-directory: frontend
        run: |
          mkdir -p electron
          cat > electron/main.js << 'EOF'
          const { app, BrowserWindow, shell, protocol } = require('electron');
          const path = require('path');
          const url = require('url');
          const fs = require('fs');
          let mainWindow;
          protocol.registerSchemesAsPrivileged([
            {
              scheme: 'app',
              privileges: {
                standard: true,
                secure: true,
                supportFetchAPI: true,
                corsEnabled: true
              }
            }
          ]);
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              minWidth: 800,
              minHeight: 600,
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                webSecurity: true,
              },
              icon: path.join(__dirname, '../public/icon.png'),
              titleBarStyle: 'hiddenInset',
              show: false,
            });
            if (process.env.NODE_ENV === 'development') {
              mainWindow.loadURL('http://localhost:3000');
              mainWindow.webContents.openDevTools();
            } else {
              const indexPath = path.join(__dirname, '../out/index.html');
              
              if (fs.existsSync(indexPath)) {
                mainWindow.loadURL(url.format({
                  pathname: indexPath,
                  protocol: 'file:',
                  slashes: true
                }));
              } else {
                console.error('index.html not found at:', indexPath);
              }
            }
            mainWindow.webContents.setWindowOpenHandler(({ url: linkUrl }) => {
              shell.openExternal(linkUrl);
              return { action: 'deny' };
            });
            mainWindow.webContents.on('did-fail-load', (event, errorCode, errorDescription, validatedURL) => {
              console.error('Failed to load:', validatedURL, errorDescription);
            });
            mainWindow.once('ready-to-show', () => {
              mainWindow.show();
            });
            mainWindow.on('closed', () => {
              mainWindow = null;
            });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') {
              app.quit();
            }
          });
          app.on('activate', () => {
            if (BrowserWindow.getAllWindows().length === 0) {
              createWindow();
            }
          });
          EOF
      - name: Generate macOS icon
        working-directory: frontend
        run: |
          npm install --save-dev sharp
          
          cat > generate-icon.js << 'ICONSCRIPT'
          const sharp = require('sharp');
          const fs = require('fs');
          
          async function generateIcon() {
            const pngPath = 'public/icon.png';
            
            if (!fs.existsSync('public')) {
              fs.mkdirSync('public', { recursive: true });
            }
            
            if (!fs.existsSync(pngPath)) {
              console.log('Creating placeholder icon...');
              const svg = Buffer.from(
                '<svg width="512" height="512"><rect width="512" height="512" fill="#3B82F6" rx="100"/><text x="256" y="300" text-anchor="middle" font-size="200" fill="white" font-family="Arial">BC</text></svg>'
              );
              await sharp(svg).resize(512, 512).png().toFile(pngPath);
            }
            
            const metadata = await sharp(pngPath).metadata();
            console.log('Icon size:', metadata.width, 'x', metadata.height);
            
            if (metadata.width < 512 || metadata.height < 512) {
              console.log('Resizing icon to 512x512...');
              await sharp(pngPath)
                .resize(512, 512, { fit: 'contain', background: { r: 0, g: 0, b: 0, alpha: 0 } })
                .toFile('public/icon-512.png');
              fs.copyFileSync('public/icon-512.png', pngPath);
            }
            
            console.log('Icon ready');
          }
          
          generateIcon().catch(console.error);
          ICONSCRIPT
          
          node generate-icon.js
      - name: Update package.json
        working-directory: frontend
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.main = 'electron/main.js';
            pkg.description = pkg.description || 'BlockStar Cypher - Secure Messaging';
            pkg.author = pkg.author || 'BlockStar';
            pkg.repository = pkg.repository || { type: 'git', url: 'https://github.com/user/repo' };
            
            pkg.build = {
              appId: 'com.blockstar.cypher',
              productName: 'BlockStar Cypher',
              directories: { output: 'dist' },
              files: ['electron/**/*', 'out/**/*', 'public/**/*', '!out/.next/cache/**/*'],
              mac: {
                target: ['dmg', 'zip'],
                icon: 'public/icon.png',
                category: 'public.app-category.social-networking'
              },
              publish: null,
              generateUpdatesFilesForAllChannels: false,
              compression: 'normal',
              asar: true
            };
            
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
      - name: Build macOS App
        working-directory: frontend
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS Build
        uses: actions/upload-artifact@v6
        with:
          name: macos-build
          path: |
            frontend/dist/*.dmg
            frontend/dist/*.zip
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # CREATE RELEASE (on tag push)
  # ═══════════════════════════════════════════════════════════════
  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-build/*.exe
            artifacts/macos-build/*.dmg
            artifacts/macos-build/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}