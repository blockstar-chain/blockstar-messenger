name: Build All Platforms

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend for Electron
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL || 'https://api.example.com' }}

      - name: Verify build output
        working-directory: frontend
        run: ls -la out/

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/out
          retention-days: 1

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    if: ${{ github.event.inputs.build_windows != 'false' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/out

      - name: Install dependencies
        working-directory: frontend
        shell: pwsh
        run: |
          if (Test-Path "package-lock.json") {
            npm ci
          } else {
            npm install
          }

      - name: Install Electron dependencies
        working-directory: frontend
        run: npm install --save-dev electron electron-builder

      - name: Verify electron files exist
        working-directory: frontend
        shell: pwsh
        run: |
          Write-Host "Checking for electron files..."
          if (-not (Test-Path "electron/main.js")) {
            Write-Host "ERROR: electron/main.js NOT FOUND"
            exit 1
          }
          Write-Host "Found electron/main.js"
          if (-not (Test-Path "electron/preload.js")) {
            Write-Host "ERROR: electron/preload.js NOT FOUND"
            exit 1
          }
          Write-Host "Found electron/preload.js"

      - name: Generate Windows icon
        working-directory: frontend
        shell: pwsh
        run: |
          npm install --save-dev sharp
          
          # Write icon generation script to file to avoid quote escaping issues
          $script = @'
          const sharp = require("sharp");
          const fs = require("fs");
          async function go() {
            if (!fs.existsSync("public")) fs.mkdirSync("public", { recursive: true });
            const pngPath = "public/icon.png";
            if (!fs.existsSync(pngPath)) {
              console.log("Creating placeholder icon...");
              const svg = Buffer.from("<svg width='256' height='256'><rect width='256' height='256' fill='#3B82F6'/><text x='128' y='140' text-anchor='middle' font-size='48' fill='white'>BC</text></svg>");
              await sharp(svg).resize(256, 256).png().toFile(pngPath);
            }
            const m = await sharp(pngPath).metadata();
            console.log("Icon:", m.width, "x", m.height);
            if (m.width < 256 || m.height < 256) {
              await sharp(pngPath).resize(256, 256).toFile("public/icon-256.png");
              fs.copyFileSync("public/icon-256.png", pngPath);
            }
            console.log("Icon ready");
          }
          go().catch(console.error);
          '@
          
          $script | Out-File -FilePath "generate-icon.js" -Encoding UTF8
          node generate-icon.js

      - name: Update package.json for electron-builder
        working-directory: frontend
        shell: pwsh
        run: |
          # Write package.json update script to file
          $script = @'
          const fs = require("fs");
          const pkg = JSON.parse(fs.readFileSync("package.json"));
          pkg.main = "electron/main.js";
          pkg.description = pkg.description || "BlockStar Cypher";
          pkg.author = pkg.author || "BlockStar";
          pkg.repository = pkg.repository || { type: "git", url: "https://github.com/user/repo" };
          pkg.build = {
            appId: "com.blockstar.cypher",
            productName: "BlockStar Cypher",
            directories: { output: "dist" },
            files: ["electron/**/*", "out/**/*", "public/**/*"],
            win: { target: ["nsis"], icon: "public/icon.png" },
            nsis: { oneClick: false, allowToChangeInstallationDirectory: true },
            publish: null,
            asar: true
          };
          fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          console.log("package.json updated");
          '@
          
          $script | Out-File -FilePath "update-pkg.js" -Encoding UTF8
          node update-pkg.js

      - name: Build Windows App
        working-directory: frontend
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: frontend/dist/*.exe
          retention-days: 30

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/windows-build/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
